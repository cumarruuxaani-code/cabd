<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dalag Agro Company</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bero">

        <header class="header">
            <a href="index.html" class="logo">
                Dalag <span>Agro Company</span>
            </a>

            <nav>

                <ul class="nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">gallery</a></li>
                    <li><a href="Help.html">Help</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    
                </ul>
            </nav>
        </header>
        <div class="contact">

            <h2>Contact Us</h2>

            <p><strong>Address:</strong> Mogadishu, Somalia</p>
            <p><strong>Phone:</strong> +252 61 234567</p>
            <p><strong>Email:</strong> info@dalagagro.com</p>

        </div>

        <div class="form">

            <form>

                <fieldset>

                    <legend>Contact Form</legend>

                    <label>Full Name</label><br>
                    <input type="text" placeholder="Enter your full name" required><br><br>

                    <label>Email</label><br>
                    <input type="email" placeholder="Enter your email" required><br><br>

                    <label>Phone Number</label><br>
                    <input type="tel" placeholder="Enter your phone number" required><br><br>

                    <label>Select Product</label><br>

                    <select>
                        <option>Maize</option>
                        <option>Tomatoes</option>
                        <option>Bananas</option>
                        <option>Onions</option>
                        <option>Vegetables</option>
                    </select>

                    <br><br>

                    <label>Gender</label><br>

                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female

                    <br><br>

                    <label>Services</label><br>

                    <input type="checkbox"> Farm Products<br>
                    <input type="checkbox"> Farm Training<br>
                    <input type="checkbox"> Farm Consultation

                    <br><br>

                    <label>Your Message</label><br>

                    <textarea rows="6" cols="40" placeholder="Write your message"></textarea>

                    <br><br>

                    <input type="submit" value="Send Message">

                </fieldset>

            </form>

        </div>

        <footer>
            <p>&copy; 2026 Dalag Agro Company. All Rights Reserved.</p>
        </footer>

    </div>

</body>

</html>
